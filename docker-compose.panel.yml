version: "3.9"

services:
  app:
    build: .
    container_name: tg-signer-panel
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=3000
      - PORT=3000
      - TZ=Asia/Shanghai
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
    init: true
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    stop_grace_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
